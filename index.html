<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050507">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Маяк">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%23050507'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23FF9F0A'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<title>Маяк · Трекер привычек</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
body{font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center}

/* устройство */
.device{position:relative;width:100%;max-width:440px;height:100dvh;background:#050507;
  display:flex;flex-direction:column;overflow:hidden}
/* десктоп: рамка iPhone 15 Pro */
@media(min-width:480px){
  body{background:#0b0b0d}
  .device{max-width:393px;height:min(852px,calc(100dvh - 36px));border-radius:54px;
    border:11px solid #15151a;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px #2a2a33;overflow:hidden}
  .island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:34px;
    background:#000;border-radius:20px;z-index:30;pointer-events:none}
}
@media(max-width:479px){.island{display:none}}

/* сцена (текущая вкладка) */
.stage{flex:1;position:relative;padding-top:env(safe-area-inset-top);background:#050507}
#frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:#050507}
.stage .top-pad{height:env(safe-area-inset-top)}
/* фолбэк при сбое вкладки */
.fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:30px;background:#050507;z-index:20}
.fallback.show{display:flex}
.fallback .ic{font-size:40px;margin-bottom:14px}
.fallback h3{font-size:18px;margin-bottom:8px}
.fallback p{color:#8A8F99;font-size:14px;line-height:1.5;max-width:280px;margin-bottom:18px}
.fallback button{height:46px;padding:0 22px;border:1px solid #FF9F0A;background:transparent;color:#FF9F0A;
  border-radius:13px;font-family:'DM Sans';font-weight:700;font-size:14px;cursor:pointer}

/* таб-бар */
.tabbar{display:flex;border-top:1px solid #1c1c24;background:#0b0b10;
  padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;background:none;border:none;color:#5a5f6a;font-family:'DM Sans';font-weight:600;
  font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 0 10px;transition:color .15s}
.tabbar button.on{color:#FF9F0A}
.tabbar .ic{font-size:21px;line-height:1}
</style>
</head>
<body>
  <div class="device">
    <div class="island"></div>
    <div class="stage">
      <iframe id="frame" title="Маяк" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <div class="fallback" id="fallback">
        <div class="ic">⚠️</div>
        <h3>Вкладка не загрузилась</h3>
        <p>Остальные вкладки работают — переключись внизу или попробуй ещё раз.</p>
        <button id="retry">Повторить</button>
      </div>
    </div>
    <div class="tabbar" id="tabbar"></div>
  </div>

<script>
/* ===== APP SHELL: переключение вкладок + изоляция/error-boundary ===== */
const TABS=[
  {id:'radar', label:'Радар',   ic:'◈', src:'tabs/radar.html'},
  {id:'soon2', label:'Итоги',   ic:'◷', src:'tabs/soon2.html'},
  {id:'soon3', label:'Задачи',  ic:'☰', src:'tabs/soon3.html'},
  {id:'profile',label:'Кабинет',ic:'◍', src:'tabs/profile.html'},
];
let cur=0, readyTimer=null;
const frame=document.getElementById('frame');
const fallback=document.getElementById('fallback');

function renderTabbar(){
  document.getElementById('tabbar').innerHTML=TABS.map((t,i)=>
    `<button class="${i===cur?'on':''}" data-i="${i}"><span class="ic">${t.ic}</span>${t.label}</button>`).join('');
  document.querySelectorAll('#tabbar button').forEach(b=>b.addEventListener('click',()=>switchTab(+b.dataset.i)));
}
function switchTab(i){
  cur=i; renderTabbar();
  fallback.classList.remove('show');
  clearTimeout(readyTimer);
  // error-boundary: если модуль не пришлёт "tab-ready" за 4с — показать фолбэк (другие вкладки живы)
  readyTimer=setTimeout(()=>{ fallback.classList.add('show'); }, 4000);
  frame.src=TABS[i].src;
}
// модуль сообщает, что успешно загрузился
window.addEventListener('message',e=>{
  if(e.data && e.data.type==='tab-ready' && e.data.tab===TABS[cur].id){
    clearTimeout(readyTimer); fallback.classList.remove('show');
  }
});
// если сам iframe не смог загрузиться
frame.addEventListener('error',()=>{ clearTimeout(readyTimer); fallback.classList.add('show'); });
document.getElementById('retry').addEventListener('click',()=>switchTab(cur));

renderTabbar();
switchTab(0);
</script>
</body>
</html>
